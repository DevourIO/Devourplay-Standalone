<!DOCTYPE html>
<html lang="en">

<head>
    <title>DevourPlay Notification</title>
</head>

<body>
    <div id="title-bar">
        <h1 class="title">DevourPlay</h1>
    </div>
    <div>
        <button id="devtools">Devtool</button>

        <div id="notification-text">Init</div>
    </div>
    <script>

		const devtoolsButton = document.getElementById("devtools")
		devtoolsButton.addEventListener("click", () => {
			window.notifications.openDevtools();
		})

		const notificationText = document.getElementById('notification-text');
		window.notifications.onMessage((data) => {
			notificationText.innerText = data.message.toString();
		});

    </script>
</body>

</html>
